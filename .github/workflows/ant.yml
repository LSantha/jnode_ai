# This workflow will build a Java project with Ant
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-ant

name: Java CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
    - name: Build JNode
      run: ./build.sh cd-x86-lite
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jnode-build
        path: |
          builder/build/
          core/build/
          fs/build/
          net/build/
          shell/build/
          gui/build/
          cli/build/
          all/build/

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: jnode-build
        path: .
    - name: Run tests
      run: |
        ./test.sh all
        ./build.sh regression-tests
